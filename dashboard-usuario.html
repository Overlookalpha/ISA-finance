<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA Finance</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>
    <h1>ISA Finance</h1>
</header>

<main>

<div class="card">
    <h3>Total de Entradas</h3>
    <h1 id="totalEntradas">€0,00</h1>
</div>

<div class="card">
    <h3>Disponível para Saque</h3>
    <h1 id="saldoDisponivel">€0,00</h1>
</div>

<div class="card">
    <h3>Total Sacado</h3>
    <h1 id="totalSacado">€0,00</h1>
</div>

<hr>

<h2>Solicitar Saque</h2>

<input
type="number"
id="valorSaque"
placeholder="Digite o valor">

<br><br>

<button id="btnSolicitar">
Solicitar Saque
</button>

<hr>

<h2>Histórico de Saques</h2>

<div id="historicoSaques">

Nenhum saque encontrado.

</div>

</main>

<script src="js/firebase.js"></script>
<script src="js/usuario.js"></script>

</body>
</html>
